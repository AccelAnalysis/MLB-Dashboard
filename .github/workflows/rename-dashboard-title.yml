name: Rename dashboard title

on:
  push:
    branches:
      - fix/constructions-operations-hub-title
    paths:
      - .github/workflows/rename-dashboard-title.yml

permissions:
  contents: write

jobs:
  rename-title:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update dashboard title
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/MLBDashboard_field_complete.jsx')
          old = 'Major League Builders Operator View'
          new = 'Constructions Operations Hub'
          text = path.read_text(encoding='utf-8')
          occurrences = text.count(old)
          if occurrences != 1:
              raise SystemExit(f'Expected exactly one title occurrence, found {occurrences}.')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          rm .github/workflows/rename-dashboard-title.yml

      - name: Commit title change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/MLBDashboard_field_complete.jsx .github/workflows/rename-dashboard-title.yml
          git commit -m "Rename dashboard title"
          git push
