name: Validate app and shared backend

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - src/**
      - supabase/**
      - scripts/**
      - .github/workflows/backend-ci.yml

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      VITE_DATA_PROVIDER: local
      VITE_AUTH_MODE: local
      LOCAL_OWNER_EMAIL: phase6-owner@example.invalid
      LOCAL_OWNER_PASSWORD: phase6-ci-password-2026-only
      LOCAL_OWNER_NAME: Phase 6 CI Owner

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Reconcile lockfile metadata
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Validate environment configuration
        run: npm run backend:check

      - name: Verify Phase 6 manual entry domain
        run: npm run phase6:verify

      - name: Build application
        run: npm run build

      - name: Start local Supabase
        id: supabase_start
        continue-on-error: true
        run: npm run supabase:start > /tmp/supabase-start.log 2>&1

      - name: Upload Supabase startup log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supabase-start-log
          path: /tmp/supabase-start.log
          if-no-files-found: error
          retention-days: 3

      - name: Require Supabase startup
        if: ${{ steps.supabase_start.outcome != 'success' }}
        run: |
          tail -n 80 /tmp/supabase-start.log
          exit 1

      - name: Apply migrations and seed data
        run: npm run db:reset

      - name: Lint database
        run: npm run db:lint

      - name: Bootstrap local owner
        run: npm run auth:bootstrap-local

      - name: Verify local authentication
        run: npm run auth:verify-local

      - name: Stop local Supabase
        if: always()
        run: npm run supabase:stop
