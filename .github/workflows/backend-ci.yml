name: Validate app and shared backend

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - src/**
      - supabase/**
      - scripts/**
      - .github/workflows/backend-ci.yml

permissions:
  contents: write

jobs:
  validate:
    if: ${{ !startsWith(github.event.pull_request.head.sha && github.event.pull_request.title || github.event.head_commit.message, 'Apply metric integrity corrections') }}
    runs-on: ubuntu-latest
    env:
      VITE_DATA_PROVIDER: local
      VITE_AUTH_MODE: local
      LOCAL_OWNER_EMAIL: phase6-owner@example.invalid
      LOCAL_OWNER_PASSWORD: phase6-ci-password-2026-only
      LOCAL_OWNER_NAME: Phase 6 CI Owner

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: test/metric-corrections
          fetch-depth: 1
          show-progress: false

      - name: Apply metric integrity source edits
        run: |
          python3 scripts/preprocess-metric-patch.py
          node scripts/apply-metric-integrity-patch.mjs
          rm -f project-docs/metric-patch-error.txt

      - name: Commit patched application files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src package.json schemas project-docs/metric-patch-error.txt
          git diff --cached --check
          git commit -m "Apply metric integrity corrections"
          git push origin HEAD:test/metric-corrections
