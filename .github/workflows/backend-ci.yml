name: Validate app and shared backend

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - src/**
      - supabase/**
      - scripts/**
      - .github/workflows/backend-ci.yml

permissions:
  contents: write

jobs:
  validate:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: test/metric-corrections
          fetch-depth: 1
          show-progress: false

      - name: Finalize metric integrity integration
        run: node scripts/finalize-metric-integrity.mjs

      - name: Commit final integration correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/MLBDashboard_field_complete.jsx
          git diff --cached --check
          git commit -m "Align metric integrity exports"
          git push origin HEAD:test/metric-corrections
