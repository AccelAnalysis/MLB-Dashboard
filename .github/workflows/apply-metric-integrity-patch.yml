name: Apply metric integrity patch

on:
  push:
    branches:
      - test/metric-corrections
    paths:
      - scripts/apply-metric-integrity-patch.mjs
      - .github/workflows/apply-metric-integrity-patch.yml

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !startsWith(github.event.head_commit.message, 'Apply metric integrity corrections') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout test branch
        uses: actions/checkout@v5
        with:
          ref: test/metric-corrections
          fetch-depth: 0

      - name: Apply guarded source edits
        run: node scripts/apply-metric-integrity-patch.mjs

      - name: Remove one-time patch machinery
        run: |
          rm scripts/apply-metric-integrity-patch.mjs
          rm .github/workflows/apply-metric-integrity-patch.yml

      - name: Commit metric integrity corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Apply metric integrity corrections"
          git push origin HEAD:test/metric-corrections
